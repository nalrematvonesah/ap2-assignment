<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <h1>🚀 Order Dashboard</h1>

  <div class="card">
    <form id="orderForm">
      <input id="customerId" placeholder="Customer ID" required />
      <input id="itemName" placeholder="Item Name" required />
      <input id="amount" type="number" placeholder="Amount" required />
      <button>Create Order</button>
    </form>
  </div>

  <div id="orderCard" class="card hidden">
    <p><b>ID:</b> <span id="orderId"></span></p>
    <p><b>Status:</b> <span id="status" class="badge">Pending</span></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
